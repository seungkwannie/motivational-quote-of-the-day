name: Daily Motivation Email

on:
  schedule:
    - cron: '30 21 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python your_script.py
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }} # Use GitHub Secrets for safety!